<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Split SaaS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: Inter, sans-serif; }
.ticket-dashed {
    background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
    background-size: 10px 10px;
}
</style>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- TABS -->
<div class="grid grid-cols-2 gap-2">
<button onclick="showTab('ticket')" class="bg-indigo-600 text-white py-2 rounded-xl">Ticket</button>
<button onclick="showTab('split')" class="bg-slate-800 text-white py-2 rounded-xl">Dividir</button>
</div>

<!-- ===================== TAB 1: TICKET ===================== -->
<div id="tab-ticket">

<div class="bg-white p-4 rounded-2xl space-y-3 shadow">

<h2 class="font-bold">🧾 Ticket de compra</h2>

<input id="business" placeholder="Nombre del negocio"
class="w-full p-3 bg-slate-50 rounded-xl">

<input type="file" accept="image/*" onchange="loadLogo(event)">

<div id="logoPreview" class="text-center"></div>

<div class="grid grid-cols-3 gap-2">
<input id="item" placeholder="Producto"
class="col-span-2 p-3 bg-slate-50 rounded-xl">

<input id="price" type="number" placeholder="$"
class="p-3 bg-slate-50 rounded-xl">
</div>

<button onclick="addItem()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl">
Agregar
</button>

</div>

<!-- TICKET -->
<div id="ticket" class="bg-white rounded-2xl shadow overflow-hidden mt-4">

<div class="bg-indigo-600 text-white text-center p-4">

<div id="logoTicket"></div>

<p id="tBusiness" class="font-bold"></p>
<p class="text-xs opacity-80" id="date"></p>

</div>

<div class="p-4 space-y-2" id="list"></div>

<div class="border-t p-4 flex justify-between font-bold text-lg">
<span>Total</span>
<span id="total">$0.00</span>
</div>

<div class="h-3 ticket-dashed"></div>

</div>

<button onclick="downloadTicket()"
class="w-full bg-green-500 text-white py-3 rounded-xl mt-3">
Descargar ticket
</button>

</div>

<!-- ===================== TAB 2: SPLIT ===================== -->
<div id="tab-split" class="hidden">

<div class="bg-white p-4 rounded-2xl shadow space-y-3">

<h2 class="font-bold">💸 Dividir gasto</h2>

<p class="text-xs text-slate-500">
Se divide el TOTAL del ticket, no por producto
</p>

<input id="people" type="number" placeholder="Número de personas"
class="w-full p-3 bg-slate-50 rounded-xl">

<button onclick="calculateSplit()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl">
Calcular
</button>

<div class="text-center space-y-2">
<p>Total:</p>
<p class="text-xl font-bold" id="splitTotal">$0.00</p>

<p>Por persona:</p>
<p class="text-2xl font-bold text-indigo-600" id="perPerson">$0.00</p>
</div>

</div>

</div>

</div>

<script>

// ================= STATE =================
let items = [];
let logoBase64 = null;

// ================= TABS =================
function showTab(tab){
document.getElementById("tab-ticket").classList.add("hidden");
document.getElementById("tab-split").classList.add("hidden");

document.getElementById("tab-"+tab).classList.remove("hidden");
}

// ================= LOGO =================
function loadLogo(e){
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(){
logoBase64 = reader.result;

document.getElementById("logoPreview").innerHTML =
`<img src="${logoBase64}" class="w-16 h-16 mx-auto rounded-lg">`;

document.getElementById("logoTicket").innerHTML =
`<img src="${logoBase64}" class="w-10 h-10 mx-auto mb-2 rounded">`;
};

reader.readAsDataURL(file);
}

// ================= ADD ITEM =================
function addItem(){

const item = document.getElementById("item").value.trim();
const price = parseFloat(document.getElementById("price").value);

if(!item || isNaN(price) || price<=0){
alert("Datos inválidos");
return;
}

items.push({item, price});

document.getElementById("item").value="";
document.getElementById("price").value="";

render();
}

// ================= RENDER =================
function render(){

document.getElementById("tBusiness").innerText =
document.getElementById("business").value;

document.getElementById("date").innerText =
new Date().toLocaleString();

const list = document.getElementById("list");

list.innerHTML = items.map(i=>`
<div class="flex justify-between text-sm">
<span>${i.item}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("");

const total = items.reduce((s,i)=>s+i.price,0);
document.getElementById("total").innerText="$"+total.toFixed(2);
}

// ================= SPLIT =================
function calculateSplit(){

const total = items.reduce((s,i)=>s+i.price,0);
const people = parseInt(document.getElementById("people").value) || 1;

document.getElementById("splitTotal").innerText =
"$"+total.toFixed(2);

document.getElementById("perPerson").innerText =
"$"+(total/people).toFixed(2);
}

// ================= EXPORT =================
async function downloadTicket(){

const el = document.getElementById("ticket");

const canvas = await html2canvas(el,{scale:2});

const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="ticket.png";
a.click();
}

</script>

</body>
</html>
