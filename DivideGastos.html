<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Split Receipt Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: Inter, sans-serif; }
.ticket-dashed {
    background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
    background-size: 10px 10px;
}
</style>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div>
<h1 class="text-xl font-bold">💸 Split Receipt</h1>
<p class="text-xs text-slate-500">Divide gastos fácilmente</p>
</div>

<!-- INPUTS -->
<div class="bg-white p-4 rounded-2xl shadow space-y-3">

<div class="grid grid-cols-3 gap-2">
<input id="item" placeholder="Producto"
class="col-span-2 p-3 rounded-xl bg-slate-50">

<input id="price" type="number" placeholder="$"
class="p-3 rounded-xl bg-slate-50">
</div>

<input id="people" type="number" placeholder="¿Entre cuántos se divide?"
class="w-full p-3 rounded-xl bg-slate-50">

<button onclick="addItem()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold">
Agregar
</button>

</div>

<!-- RECEIPT -->
<div id="receipt" class="bg-white rounded-2xl shadow overflow-hidden">

<div class="bg-indigo-600 text-white text-center p-4">
<p class="font-bold">NOTA DE REMISIÓN</p>
<p class="text-xs opacity-80" id="date"></p>
</div>

<div class="p-4 space-y-2" id="list"></div>

<div class="border-t p-4 space-y-2">

<div class="flex justify-between font-bold">
<span>Total</span>
<span id="total">$0.00</span>
</div>

<div class="flex justify-between text-indigo-600 font-bold">
<span>Por persona</span>
<span id="split">$0.00</span>
</div>

</div>

<div class="h-3 ticket-dashed"></div>

</div>

<!-- ACTIONS -->
<div class="grid grid-cols-2 gap-2">
<button onclick="save()"
class="bg-slate-800 text-white py-3 rounded-xl">Guardar</button>

<button onclick="download()"
class="bg-green-500 text-white py-3 rounded-xl">Descargar</button>
</div>

<!-- HISTORY -->
<div>
<h3 class="text-sm font-bold text-slate-600 mb-2">Historial</h3>
<div id="history" class="space-y-2"></div>
</div>

</div>

<script>

let items = [];
let history = JSON.parse(localStorage.getItem("split_receipts")) || [];

document.getElementById("date").innerText =
new Date().toLocaleString();

// ADD ITEM
function addItem(){

const item = document.getElementById("item").value.trim();
const price = parseFloat(document.getElementById("price").value);
const people = parseInt(document.getElementById("people").value);

if(!item || isNaN(price) || price<=0){
alert("Datos inválidos");
return;
}

items.push({id:crypto.randomUUID(), item, price});

document.getElementById("item").value="";
document.getElementById("price").value="";

render();
}

// RENDER
function render(){

const list = document.getElementById("list");

list.innerHTML = items.map(i=>`
<div class="flex justify-between text-sm">
<span>${i.item}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("");

const total = items.reduce((s,i)=>s+i.price,0);
const people = parseInt(document.getElementById("people").value) || 1;

document.getElementById("total").innerText="$"+total.toFixed(2);
document.getElementById("split").innerText="$"+(total/people).toFixed(2);
}

// SAVE
function save(){

if(items.length===0) return;

const record = {
id:Date.now(),
items:[...items],
total: items.reduce((s,i)=>s+i.price,0),
people: document.getElementById("people").value || 1,
date:new Date().toLocaleString()
};

history.unshift(record);
localStorage.setItem("split_receipts",JSON.stringify(history));

renderHistory();
items=[];
render();
}

// DOWNLOAD IMAGE
async function download(){

const el = document.getElementById("receipt");

const canvas = await html2canvas(el,{scale:2});

const a=document.createElement("a");
a.download="nota-remision.png";
a.href=canvas.toDataURL();
a.click();
}

// HISTORY
function renderHistory(){

const h=document.getElementById("history");

h.innerHTML = history.map(r=>`
<div class="bg-white p-3 rounded-xl shadow-sm text-sm">
<p class="font-bold">Ticket #${r.id.toString().slice(-4)}</p>
<p class="text-xs text-slate-400">${r.date}</p>

<div class="mt-2">
${r.items.map(i=>`
<div class="flex justify-between">
<span>${i.item}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("")}
</div>

<div class="flex justify-between mt-2 font-bold">
<span>Total</span>
<span>$${r.total.toFixed(2)}</span>
</div>

<div class="text-indigo-600 font-bold">
Por persona: $${(r.total/r.people).toFixed(2)}
</div>

</div>
`).join("");
}

renderHistory();

</script>

</body>
</html>
