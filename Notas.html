<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notas</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: Inter, sans-serif; }
.ticket-dashed {
  background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
  background-size: 10px 10px;
}
</style>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="flex items-center justify-between">
<h1 class="text-xl font-bold">Split Receipt</h1>
<i class="bi bi-receipt text-2xl text-indigo-600"></i>
</div>

<!-- FORM -->
<div class="bg-white p-4 rounded-2xl shadow space-y-3">

<!-- BUSINESS -->
<input id="business" placeholder="Nombre del negocio"
class="w-full p-3 bg-slate-50 rounded-xl">

<!-- LOGO -->
<label class="flex items-center gap-2 text-sm text-indigo-600 cursor-pointer">
<i class="bi bi-image"></i> Subir logo
<input type="file" accept="image/*" hidden onchange="loadLogo(event)">
</label>

<div id="logoPreview" class="flex justify-center"></div>

<!-- ITEM INPUT -->
<div class="grid grid-cols-3 gap-2">
<input id="item" placeholder="Producto"
class="col-span-2 p-3 bg-slate-50 rounded-xl">

<input id="price" type="number" placeholder="$"
class="p-3 bg-slate-50 rounded-xl">
</div>

<!-- ADD BUTTON (PRIMERO) -->
<button onclick="addItem()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2">

<i class="bi bi-plus-circle"></i>
Agregar producto

</button>

<!-- SPLIT (OPCIONAL) -->
<input id="people" type="number" placeholder="Personas para dividir (opcional)"
class="w-full p-3 bg-slate-50 rounded-xl">

<button onclick="render()"
class="w-full bg-slate-800 text-white py-3 rounded-xl flex items-center justify-center gap-2">

<i class="bi bi-calculator"></i>
Actualizar división

</button>

</div>

<!-- TICKET -->
<div id="ticket" class="bg-white rounded-2xl shadow overflow-hidden">

<div class="bg-indigo-600 text-white text-center p-4">

<div id="logoTicket"></div>

<p class="font-bold" id="tBusiness">Sin nombre</p>
<p class="text-xs opacity-80" id="date"></p>

</div>

<div class="p-4 space-y-2" id="list"></div>

<div class="border-t p-4 space-y-1">

<div class="flex justify-between font-bold">
<span>Total</span>
<span id="total">$0.00</span>
</div>

<div class="flex justify-between text-indigo-600 font-bold">
<span>Por persona</span>
<span id="split">$0.00</span>
</div>

</div>

<div class="h-3 ticket-dashed"></div>

</div>

<!-- ACTIONS -->
<div class="grid grid-cols-2 gap-2">

<button onclick="shareTicketImage()"
class="bg-green-500 text-white py-3 rounded-xl flex items-center justify-center gap-2">

<i class="bi bi-whatsapp"></i>
Compartir

</button>

<button onclick="downloadTicket()"
class="bg-indigo-600 text-white py-3 rounded-xl flex items-center justify-center gap-2">

<i class="bi bi-download"></i>
Descargar

</button>

</div>

</div>

<script>

// ================= STATE =================
let items = [];
let logoBase64 = null;

// ================= INIT =================
window.onload = () => {
document.getElementById("date").innerText = new Date().toLocaleString();
};

// ================= LOGO =================
function loadLogo(e){
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = () => {
logoBase64 = reader.result;

document.getElementById("logoPreview").innerHTML =
`<img src="${logoBase64}" class="w-14 h-14 rounded-xl shadow">`;

document.getElementById("logoTicket").innerHTML =
`<img src="${logoBase64}" class="w-10 h-10 mx-auto mb-2 rounded-lg">`;
};

reader.readAsDataURL(file);
}

// ================= ADD ITEM =================
function addItem(){

const item = document.getElementById("item").value.trim();
const price = parseFloat(document.getElementById("price").value);

if(!item || isNaN(price) || price <= 0){
alert("Datos inválidos");
return;
}

items.push({ item, price });

document.getElementById("item").value="";
document.getElementById("price").value="";

render();
}

// ================= RENDER =================
function render(){

document.getElementById("tBusiness").innerText =
document.getElementById("business").value || "Sin nombre";

const list = document.getElementById("list");

list.innerHTML = items.map(i=>`
<div class="flex justify-between text-sm">
<span>${i.item}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("");

const total = items.reduce((s,i)=>s+i.price,0);
const people = parseInt(document.getElementById("people").value);

document.getElementById("total").innerText = "$"+total.toFixed(2);

// SOLO si hay valor válido
if(people && people > 0){
document.getElementById("split").innerText =
"$"+(total/people).toFixed(2);
}else{
document.getElementById("split").innerText = "$0.00";
}
}

// ================= DOWNLOAD =================
async function downloadTicket(){

const el = document.getElementById("ticket");

const canvas = await html2canvas(el,{
scale:2,
useCORS:true,
backgroundColor:"#ffffff"
});

const a = document.createElement("a");
a.href = canvas.toDataURL();
a.download = "ticket.png";
a.click();
}

// ================= SHARE =================
async function shareTicketImage(){

const el = document.getElementById("ticket");

const canvas = await html2canvas(el,{
scale:2,
useCORS:true,
backgroundColor:"#ffffff"
});

canvas.toBlob(async blob=>{

const file = new File([blob], "ticket.png", { type: "image/png" });

if(navigator.canShare && navigator.canShare({files:[file]})){

await navigator.share({
files:[file],
title:"Ticket de gasto"
});

}else{

const a = document.createElement("a");
a.href = canvas.toDataURL();
a.download = "ticket.png";
a.click();

alert("Descargado para compartir manualmente");

}

});

}

</script>

</body>
</html>
