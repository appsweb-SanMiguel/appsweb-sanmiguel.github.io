<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Receipt Pro</title>

<!-- FIX CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
    --primary:#6366f1;
    --bg:#f1f5f9;
    --card:#fff;
    --text:#1e293b;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    padding:20px;
}

.card {
    background: var(--card);
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

input {
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Nueva compra</h2>

    <input id="name" placeholder="Producto">
    <input id="price" type="number" placeholder="Precio">

    <button onclick="addItem()">Agregar</button>

    <div id="list"></div>

    <h3 id="total">$0.00</h3>

    <button onclick="save()">Guardar</button>
    <button onclick="clearAll()">Limpiar</button>
    <button onclick="share()">Compartir</button>
</div>

<div class="card">
    <h3>Historial</h3>
    <div id="history"></div>
</div>

<script>
// ================== STATE ==================
let items = [];
let history = JSON.parse(localStorage.getItem("history_v2")) || [];

// ================== SECURITY ==================
function escapeHTML(str){
    return str.replace(/[&<>"']/g, t => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",
        '"':"&quot;","'":"&#39;"
    }[t]));
}

// ================== LOGIC ==================
function addItem(){
    const name = document.getElementById("name").value.trim();
    const price = parseFloat(document.getElementById("price").value);

    if(!name || isNaN(price) || price <= 0){
        alert("Datos inválidos");
        return;
    }

    items.push({
        id: crypto.randomUUID(),
        name,
        price
    });

    document.getElementById("name").value="";
    document.getElementById("price").value="";

    render();
}

function render(){
    const list = document.getElementById("list");

    if(items.length === 0){
        list.innerHTML = "<p>Sin productos</p>";
        updateTotal();
        return;
    }

    list.innerHTML = items.map(i => `
        <div>
            ${escapeHTML(i.name)} - $${i.price.toFixed(2)}
            <button onclick="removeItem('${i.id}')">x</button>
        </div>
    `).join("");

    updateTotal();
}

function removeItem(id){
    if(!confirm("Eliminar producto?")) return;
    items = items.filter(i => i.id !== id);
    render();
}

function updateTotal(){
    const total = items.reduce((s,i)=>s+i.price,0);
    document.getElementById("total").innerText = "$"+total.toFixed(2);
}

// ================== STORAGE ==================
function save(){
    if(items.length === 0) return;

    const record = {
        id: Date.now(),
        date: new Date().toLocaleString(),
        items:[...items],
        total: items.reduce((s,i)=>s+i.price,0)
    };

    history.unshift(record);
    localStorage.setItem("history_v2", JSON.stringify(history));

    items = [];
    render();
    renderHistory();
}

function clearAll(){
    if(!confirm("Limpiar lista?")) return;
    items=[];
    render();
}

function renderHistory(){
    const container = document.getElementById("history");

    container.innerHTML = history.map(h => `
        <div style="margin-bottom:10px;">
            <strong>#${h.id.toString().slice(-4)}</strong>
            <br>${h.date}
            <br>Total: $${h.total.toFixed(2)}
        </div>
    `).join("");
}

// ================== SHARE ==================
async function share(){
    const el = document.body;

    const canvas = await html2canvas(el);
    canvas.toBlob(async blob=>{
        const file = new File([blob], "ticket.png",{type:"image/png"});

        if(navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({
                files:[file],
                title:"Ticket"
            });
        } else {
            const a=document.createElement("a");
            a.href=canvas.toDataURL();
            a.download="ticket.png";
            a.click();
        }
    });
}

// INIT
render();
renderHistory();
</script>

</body>
</html>
