<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Receipt Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="flex justify-between items-center">
    <div>
        <h1 class="text-xl font-bold text-slate-800">Smart Receipt</h1>
        <p class="text-xs text-slate-500">Control de ventas simple</p>
    </div>
</div>

<!-- FORM -->
<div class="bg-white p-4 rounded-2xl shadow-sm space-y-3">

<input id="business" placeholder="Nombre del negocio"
class="w-full p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500">

<input id="client" placeholder="Cliente"
class="w-full p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500">

<div class="grid grid-cols-3 gap-2">
<input id="name" placeholder="Producto"
class="col-span-2 p-3 rounded-xl bg-slate-50">

<input id="price" type="number" placeholder="$"
class="p-3 rounded-xl bg-slate-50">
</div>

<button onclick="addItem()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold active:scale-95">
Agregar producto
</button>

</div>

<!-- TICKET -->
<div id="ticket" class="bg-white rounded-2xl shadow p-4">

<div class="text-center border-b pb-2 mb-2">
<p id="tBusiness" class="font-bold text-slate-800"></p>
<p id="tClient" class="text-xs text-slate-500"></p>
<p id="tDate" class="text-xs text-slate-400"></p>
</div>

<div id="list" class="space-y-2"></div>

<div class="border-t mt-3 pt-2 flex justify-between font-bold text-lg">
<span>Total</span>
<span id="total">$0.00</span>
</div>

</div>

<!-- ACTIONS -->
<div class="grid grid-cols-3 gap-2">

<button onclick="save()"
class="bg-slate-800 text-white py-3 rounded-xl text-sm">Guardar</button>

<button onclick="share()"
class="bg-green-500 text-white py-3 rounded-xl text-sm">WhatsApp</button>

<button onclick="clearAll()"
class="bg-red-100 text-red-600 py-3 rounded-xl text-sm">Limpiar</button>

</div>

<!-- HISTORY -->
<div>
<h3 class="text-sm font-bold text-slate-600 mb-2">Historial</h3>
<div id="history" class="space-y-2"></div>
</div>

</div>

<script>

// STATE
let items = [];
let history = JSON.parse(localStorage.getItem("pro_receipts")) || [];

document.getElementById("tDate").innerText =
new Date().toLocaleDateString();

// SECURITY
function escapeHTML(str){
return str.replace(/[&<>"']/g, t => ({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[t]));
}

// ADD ITEM
function addItem(){
const name = document.getElementById("name").value.trim();
const price = parseFloat(document.getElementById("price").value);

if(!name || isNaN(price) || price<=0){
alert("Datos inválidos");
return;
}

items.push({
id: crypto.randomUUID(),
name,
price
});

document.getElementById("name").value="";
document.getElementById("price").value="";

render();
}

// RENDER
function render(){

// header dinámico
document.getElementById("tBusiness").innerText =
document.getElementById("business").value;

document.getElementById("tClient").innerText =
document.getElementById("client").value;

const list = document.getElementById("list");

list.innerHTML = items.map(i=>`
<div class="flex justify-between text-sm">
<span>${escapeHTML(i.name)}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("");

const total = items.reduce((s,i)=>s+i.price,0);
document.getElementById("total").innerText="$"+total.toFixed(2);
}

// CLEAR
function clearAll(){
if(!confirm("Limpiar lista?")) return;
items=[];
render();
}

// SAVE
function save(){

if(items.length===0){
alert("Agrega productos");
return;
}

const record = {
id: Date.now(),
business: document.getElementById("business").value,
client: document.getElementById("client").value,
items:[...items],
total: items.reduce((s,i)=>s+i.price,0)
};

history.unshift(record);
localStorage.setItem("pro_receipts", JSON.stringify(history));

items=[];
render();
renderHistory();
}

// HISTORY
function renderHistory(){
const h = document.getElementById("history");

h.innerHTML = history.map(r=>`
<div class="bg-white p-3 rounded-xl shadow-sm flex justify-between text-sm">
<div>
<p class="font-semibold">${escapeHTML(r.business)}</p>
<p class="text-xs text-slate-400">${escapeHTML(r.client)}</p>
</div>
<p class="font-bold">$${r.total.toFixed(2)}</p>
</div>
`).join("");
}

// SHARE
async function share(){
const el = document.getElementById("ticket");

const canvas = await html2canvas(el,{scale:2});
canvas.toBlob(async blob=>{
const file = new File([blob],"ticket.png",{type:"image/png"});

if(navigator.canShare && navigator.canShare({files:[file]})){
await navigator.share({files:[file]});
}else{
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="ticket.png";
a.click();
}
});
}

// INIT
renderHistory();

</script>

</body>
</html>
