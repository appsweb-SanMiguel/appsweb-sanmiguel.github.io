<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Receipt Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#f1f5f9;
    padding:20px;
}

.card {
    background:#fff;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.primary { background:#6366f1; color:white; }
.green { background:#22c55e; color:white; }
.red { background:#ef4444; color:white; }
</style>
</head>

<body>

<div class="card">

<h2>📄 Nuevo Ticket</h2>

<input id="business" placeholder="Nombre del negocio">
<input id="client" placeholder="Cliente">

<input id="name" placeholder="Producto">
<input id="price" type="number" placeholder="Precio">

<button class="primary" onclick="addItem()">Agregar</button>

<div id="list"></div>

<h3 id="total">$0.00</h3>

<textarea id="notes" placeholder="Notas..."></textarea>

<button class="primary" onclick="save()">Guardar</button>
<button class="green" onclick="share()">Compartir</button>
<button class="red" onclick="clearAll()">Limpiar</button>

</div>

<div class="card">
<h3>📅 Historial</h3>
<div id="history"></div>
</div>

<script>

// STATE
let items = [];
let history = JSON.parse(localStorage.getItem("saas_receipts")) || [];

// SECURITY
function escapeHTML(str){
    return str.replace(/[&<>"']/g, t => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",
        '"':"&quot;","'":"&#39;"
    }[t]));
}

// ADD ITEM
function addItem(){
    const name = document.getElementById("name").value.trim();
    const price = parseFloat(document.getElementById("price").value);

    if(!name || isNaN(price) || price<=0){
        alert("Datos inválidos");
        return;
    }

    items.push({
        id: crypto.randomUUID(),
        name,
        price
    });

    document.getElementById("name").value="";
    document.getElementById("price").value="";

    render();
}

// RENDER
function render(){
    const list = document.getElementById("list");

    list.innerHTML = items.map(i => `
        <div>
            ${escapeHTML(i.name)} - $${i.price.toFixed(2)}
            <button onclick="removeItem('${i.id}')">x</button>
        </div>
    `).join("");

    updateTotal();
}

function removeItem(id){
    items = items.filter(i=>i.id!==id);
    render();
}

function updateTotal(){
    const total = items.reduce((s,i)=>s+i.price,0);
    document.getElementById("total").innerText="$"+total.toFixed(2);
}

// SAVE
function save(){
    const business = document.getElementById("business").value;
    const client = document.getElementById("client").value;
    const notes = document.getElementById("notes").value;

    if(items.length===0){
        alert("No hay productos");
        return;
    }

    const record = {
        id: Date.now(),
        business,
        client,
        notes,
        items:[...items],
        total: items.reduce((s,i)=>s+i.price,0),
        date: new Date().toLocaleString()
    };

    history.unshift(record);
    localStorage.setItem("saas_receipts", JSON.stringify(history));

    items=[];
    render();
    renderHistory();
}

// CLEAR
function clearAll(){
    if(!confirm("Limpiar?")) return;
    items=[];
    render();
}

// HISTORY
function renderHistory(){
    const h = document.getElementById("history");

    h.innerHTML = history.map(r=>`
        <div style="margin-bottom:10px;">
            <strong>${escapeHTML(r.business)}</strong><br>
            Cliente: ${escapeHTML(r.client)}<br>
            $${r.total.toFixed(2)}
        </div>
    `).join("");
}

// SHARE
async function share(){
    const el = document.body;

    const canvas = await html2canvas(el);
    canvas.toBlob(async blob=>{
        const file = new File([blob],"ticket.png",{type:"image/png"});

        if(navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({
                files:[file],
                title:"Ticket"
            });
        } else {
            const a=document.createElement("a");
            a.href=canvas.toDataURL();
            a.download="ticket.png";
            a.click();
        }
    });
}

// INIT
render();
renderHistory();

</script>

</body>
</html>
