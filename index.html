<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Receipt Pro</title>
    <!-- Librería para convertir HTML a Imagen -->
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --secondary: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }

        .app-container { max-width: 450px; margin: 0 auto; }
        
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* Formulario */
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { 
            padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; 
            outline: none; width: 100%; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); ring: 2px var(--primary); }
        
        .btn-add { 
            background: var(--primary); color: white; border: none; 
            padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        /* Ticket Estilizado */
        #ticket-export {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #f0f0f0;
        }
        .ticket-header { text-align: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f8fafc; }
        
        .totals { margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 12px; }
        .grand-total { font-weight: 600; font-size: 1.2rem; color: var(--primary); margin-top: 10px; border-top: 1px solid #ddd; pt: 10px; }

        /* Agenda / Historial */
        .history-title { font-size: 0.9rem; color: var(--secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .history-item { 
            background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);
        }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { 
            padding: 12px; border: none; border-radius: 10px; cursor: pointer; 
            font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-share { background: #25D366; color: white; }
        .btn-save { background: var(--primary); color: white; }
        .btn-clear { background: #fee2e2; color: #ef4444; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h1>🛒 Nueva Compra</h1>
        <div class="input-group">
            <input type="text" id="itemName" placeholder="Producto...">
            <input type="number" id="itemPrice" placeholder="$0.00" style="width: 100px">
            <button class="btn-add" onclick="addItem()">+</button>
        </div>

        <!-- Área que se convertirá en imagen -->
        <div id="ticket-export">
            <div class="ticket-header">
                <h2 style="font-size: 1.1rem;">SMART RECEIPT</h2>
                <small id="currentDate"></small>
            </div>
            <div id="itemList">
                <p style="text-align: center; color: #94a3b8; padding: 20px;">No hay productos</p>
            </div>
            <div class="totals">
                <div style="display: flex; justify-content: space-between;">
                    <span>Total</span>
                    <span id="totalDisplay">$0.00</span>
                </div>
                <div class="grand-total" style="display: flex; justify-content: space-between;">
                    <span>A pagar</span>
                    <span id="grandTotalDisplay">$0.00</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-save" onclick="saveToHistory()">💾 Guardar</button>
            <button class="btn btn-share" onclick="shareAsImage()">WhatsApp</button>
        </div>
        <button class="btn-clear" onclick="clearCurrent()">Limpiar actual</button>
    </div>

    <p class="history-title">📅 Historial de Compras</p>
    <div id="historyList"></div>
</div>

<script>
    let currentItems = [];
    let history = JSON.parse(localStorage.getItem('receiptHistory')) || [];

    document.getElementById('currentDate').innerText = new Date().toLocaleString();

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        if (name && price) {
            currentItems.push({ name, price });
            updateUI();
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
        }
    }

    function updateUI() {
        const list = document.getElementById('itemList');
        if (currentItems.length === 0) {
            list.innerHTML = `<p style="text-align: center; color: #94a3b8; padding: 20px;">No hay productos</p>`;
            return;
        }
        
        list.innerHTML = currentItems.map(item => `
            <div class="item-row">
                <span>${item.name}</span>
                <span style="font-weight: 600;">$${item.price.toFixed(2)}</span>
            </div>
        `).join('');

        const total = currentItems.reduce((s, i) => s + i.price, 0);
        document.getElementById('totalDisplay').innerText = `$${total.toFixed(2)}`;
        document.getElementById('grandTotalDisplay').innerText = `$${total.toFixed(2)}`;
    }

    function clearCurrent() {
        currentItems = [];
        updateUI();
    }

    // Guardar en la "Agenda" (LocalStorage)
    function saveToHistory() {
        if (currentItems.length === 0) return;
        const total = currentItems.reduce((s, i) => s + i.price, 0);
        const record = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            total: total
        };
        history.unshift(record);
        localStorage.setItem('receiptHistory', JSON.stringify(history));
        renderHistory();
        clearCurrent();
    }

    function renderHistory() {
        const hList = document.getElementById('historyList');
        hList.innerHTML = history.map(item => `
            <div class="history-item">
                <div>
                    <div style="font-weight: 600;">Compra #${item.id.toString().slice(-4)}</div>
                    <small style="color: #64748b;">${item.date}</small>
                </div>
                <div style="font-weight: 600; color: var(--primary);">$${item.total.toFixed(2)}</div>
            </div>
        `).join('');
    }

    // FUNCIÓN MÁGICA: Compartir como imagen
    async function shareAsImage() {
        const ticket = document.getElementById('ticket-export');
        
        // 1. Convertir div a canvas
        const canvas = await html2canvas(ticket, { backgroundColor: '#ffffff' });
        
        // 2. Convertir canvas a Blob
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'ticket.png', { type: 'image/png' });
            
            // 3. Usar API de compartir nativa (funciona en móviles)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Mi Ticket de Compra',
                        text: 'Aquí está el resumen de la compra.'
                    });
                } catch (err) {
                    alert("Error al compartir. Intenta descargar la imagen.");
                }
            } else {
                // Fallback: Descargar imagen si no se puede compartir directamente
                const link = document.createElement('a');
                link.download = 'ticket.png';
                link.href = canvas.toDataURL();
                link.click();
                alert("Tu navegador no soporta compartir directamente. Se ha descargado la imagen para que la envíes manualmente.");
            }
        });
    }

    renderHistory();
</script>

</body>
</html>
