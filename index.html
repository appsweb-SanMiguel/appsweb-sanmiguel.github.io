<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Receipt - Lista de Compras</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 20px; text-align: center; color: var(--primary); }

        /* Formulario */
        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            padding: 12px;
            border: 1px solid var(--accent);
            border-radius: 12px;
            outline: none;
            background: var(--bg);
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Estilo de Ticket */
        .ticket {
            border-top: 2px dashed #e2e8f0;
            padding-top: 20px;
            margin-top: 10px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .item-info span { display: block; font-size: 0.9rem; }
        .item-price { font-weight: 600; }

        /* Totales */
        .totals {
            margin-top: 25px;
            background: var(--accent);
            padding: 20px;
            border-radius: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .grand-total {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            border-top: 1px solid #cbd5e1;
            padding-top: 10px;
            margin-top: 10px;
        }

        /* División */
        .split-section {
            margin-top: 20px;
            text-align: center;
        }

        .split-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-round {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .delete-btn {
            background: transparent;
            color: #ef4444;
            font-size: 0.8rem;
            padding: 5px;
        }

        @media (max-width: 480px) {
            .container { border-radius: 0; padding: 20px; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Receipt</h1>

    <div class="input-group">
        <input type="text" id="itemName" placeholder="Producto...">
        <input type="number" id="itemPrice" placeholder="$0.00" step="0.01">
        <button onclick="addItem()">+</button>
    </div>

    <div class="ticket" id="itemList">
        <!-- Los productos aparecerán aquí -->
    </div>

    <div class="totals">
        <div class="total-row">
            <span>Subtotal</span>
            <span id="subtotalDisplay">$0.00</span>
        </div>
        
        <div class="split-section">
            <span>Dividir entre:</span>
            <div class="split-controls">
                <button class="btn-round" onclick="updateSplit(-1)">-</button>
                <span id="peopleCount" style="font-weight: 600;">1</span>
                <button class="btn-round" onclick="updateSplit(1)">+</button>
            </div>
        </div>

        <div class="total-row grand-total">
            <span>Por persona</span>
            <span id="splitTotalDisplay">$0.00</span>
        </div>
    </div>
</div>

<script>
    let items = [];
    let people = 1;

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);

        if (name && !isNaN(price)) {
            items.push({ name, price, id: Date.now() });
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            render();
        }
    }

    function deleteItem(id) {
        items = items.filter(item => item.id !== id);
        render();
    }

    function updateSplit(val) {
        if (people + val >= 1) {
            people += val;
            document.getElementById('peopleCount').innerText = people;
            calculate();
        }
    }

    function calculate() {
        const total = items.reduce((sum, item) => sum + item.price, 0);
        const perPerson = total / people;

        document.getElementById('subtotalDisplay').innerText = `$${total.toFixed(2)}`;
        document.getElementById('splitTotalDisplay').innerText = `$${perPerson.toFixed(2)}`;
    }

    function render() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';

        items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="item-info">
                    <span>${item.name}</span>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span class="item-price">$${item.price.toFixed(2)}</span>
                    <button class="delete-btn" onclick="deleteItem(${item.id})">✕</button>
                </div>
            `;
            list.appendChild(row);
        });

        calculate();
    }

    // Permitir "Enter" para agregar
    document.getElementById('itemPrice').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addItem();
    });
</script>

</body>
</html>
