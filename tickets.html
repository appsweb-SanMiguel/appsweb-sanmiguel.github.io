<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Receipt Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.ticket-dashed {
    background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
    background-size: 12px 12px;
}
</style>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div>
<h1 class="text-xl font-bold text-slate-800">Smart Receipt</h1>
<p class="text-xs text-slate-500">Tickets rápidos para tu negocio</p>
</div>

<!-- FORM -->
<div class="bg-white p-4 rounded-2xl shadow-sm space-y-3">

<input id="business" placeholder="Nombre del negocio"
class="w-full p-3 rounded-xl bg-slate-50">

<input id="client" placeholder="Cliente"
class="w-full p-3 rounded-xl bg-slate-50">

<div class="grid grid-cols-3 gap-2">
<input id="name" placeholder="Producto"
class="col-span-2 p-3 rounded-xl bg-slate-50">

<input id="price" type="number" placeholder="$"
class="p-3 rounded-xl bg-slate-50">
</div>

<textarea id="notes" placeholder="Notas..."
class="w-full p-3 rounded-xl bg-slate-50"></textarea>

<button onclick="addItem()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold">
Agregar producto
</button>

</div>

<!-- TICKET -->
<div id="ticket" class="bg-white rounded-2xl shadow overflow-hidden">

<div class="bg-indigo-600 text-white text-center p-4">
<p id="tBusiness" class="font-bold"></p>
<p id="tClient" class="text-xs opacity-80"></p>
<p id="tDate" class="text-xs opacity-70"></p>
</div>

<div class="p-4 space-y-2">

<div id="list"></div>

<div class="border-t pt-2 text-sm">
<p id="tNotes" class="text-slate-500"></p>
</div>

<div class="border-t pt-3 flex justify-between font-bold text-lg">
<span>Total</span>
<span id="total">$0.00</span>
</div>

</div>

<div class="h-3 ticket-dashed"></div>

</div>

<!-- ACTIONS -->
<div class="grid grid-cols-3 gap-2">
<button onclick="save()" class="bg-slate-800 text-white py-3 rounded-xl">Guardar</button>
<button onclick="share()" class="bg-green-500 text-white py-3 rounded-xl">WhatsApp</button>
<button onclick="clearAll()" class="bg-red-100 text-red-600 py-3 rounded-xl">Limpiar</button>
</div>

<!-- HISTORY -->
<div>
<h3 class="text-sm font-bold text-slate-600 mb-2">Historial</h3>
<div id="history" class="space-y-3"></div>
</div>

</div>

<script>

// STATE
let items = [];
let history = JSON.parse(localStorage.getItem("receipts_full")) || [];

// SECURITY
function escapeHTML(str){
return str.replace(/[&<>"']/g, t => ({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[t]));
}

// ADD
function addItem(){
const name = document.getElementById("name").value.trim();
const price = parseFloat(document.getElementById("price").value);

if(!name || isNaN(price) || price<=0){
alert("Datos inválidos");
return;
}

items.push({
id: crypto.randomUUID(),
name,
price
});

document.getElementById("name").value="";
document.getElementById("price").value="";

render();
}

// RENDER
function render(){

document.getElementById("tBusiness").innerText =
document.getElementById("business").value;

document.getElementById("tClient").innerText =
document.getElementById("client").value;

document.getElementById("tNotes").innerText =
document.getElementById("notes").value;

document.getElementById("tDate").innerText =
new Date().toLocaleString();

const list = document.getElementById("list");

list.innerHTML = items.map(i=>`
<div class="flex justify-between text-sm">
<span>${escapeHTML(i.name)}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("");

const total = items.reduce((s,i)=>s+i.price,0);
document.getElementById("total").innerText="$"+total.toFixed(2);
}

// SAVE
function save(){

if(items.length===0){
alert("Agrega productos");
return;
}

const record = {
id: Date.now(),
business: document.getElementById("business").value,
client: document.getElementById("client").value,
notes: document.getElementById("notes").value,
items:[...items],
total: items.reduce((s,i)=>s+i.price,0),
date: new Date().toLocaleString()
};

history.unshift(record);
localStorage.setItem("receipts_full", JSON.stringify(history));

items=[];
render();
renderHistory();
}

// HISTORY (ahora muestra ticket completo)
function renderHistory(){
const h = document.getElementById("history");

h.innerHTML = history.map(r=>`
<div class="bg-white p-3 rounded-xl shadow-sm">
<p class="font-bold">${escapeHTML(r.business)}</p>
<p class="text-xs text-slate-400">${escapeHTML(r.client)}</p>

<div class="text-sm mt-2 space-y-1">
${r.items.map(i=>`
<div class="flex justify-between">
<span>${escapeHTML(i.name)}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("")}
</div>

<div class="flex justify-between font-bold mt-2 border-t pt-2">
<span>Total</span>
<span>$${r.total.toFixed(2)}</span>
</div>
</div>
`).join("");
}

// CLEAR
function clearAll(){
if(!confirm("Limpiar?")) return;
items=[];
render();
}

// SHARE
async function share(){
const el = document.getElementById("ticket");

const canvas = await html2canvas(el,{scale:2});
canvas.toBlob(async blob=>{
const file = new File([blob],"ticket.png",{type:"image/png"});

if(navigator.canShare && navigator.canShare({files:[file]})){
await navigator.share({files:[file]});
}else{
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="ticket.png";
a.click();
}
});
}

// INIT
render();
renderHistory();

</script>

</body>
</html>
