<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Split Receipt Pro</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: Inter, sans-serif; }
.ticket-dashed {
  background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
  background-size: 10px 10px;
}
</style>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto p-4 space-y-4">

<!-- HEADER -->
<div class="flex items-center justify-between">
<h1 class="text-xl font-bold">Split Receipt</h1>
<i class="bi bi-receipt text-2xl text-indigo-600"></i>
</div>

<!-- FORM -->
<div class="bg-white p-4 rounded-2xl shadow space-y-3">

<!-- BUSINESS -->
<input id="business" placeholder="Nombre del negocio"
class="w-full p-3 bg-slate-50 rounded-xl">

<!-- LOGO UPLOAD -->
<label class="flex items-center gap-2 text-sm text-indigo-600 cursor-pointer">
<i class="bi bi-image"></i>
Subir logo
<input type="file" accept="image/*" hidden onchange="loadLogo(event)">
</label>

<div id="logoPreview" class="flex justify-center"></div>

<!-- INPUTS -->
<div class="grid grid-cols-3 gap-2">
<input id="item" placeholder="Producto"
class="col-span-2 p-3 bg-slate-50 rounded-xl">

<input id="price" type="number" placeholder="$"
class="p-3 bg-slate-50 rounded-xl">
</div>

<input id="people" type="number" placeholder="Personas para dividir"
class="w-full p-3 bg-slate-50 rounded-xl">

<button onclick="addItem()"
class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2">
<i class="bi bi-plus-circle"></i> Agregar
</button>

</div>

<!-- TICKET -->
<div id="ticket" class="bg-white rounded-2xl shadow overflow-hidden">

<div class="bg-indigo-600 text-white text-center p-4">

<div id="logoTicket"></div>

<p class="font-bold" id="tBusiness"></p>
<p class="text-xs opacity-80" id="date"></p>

</div>

<div class="p-4 space-y-2" id="list"></div>

<div class="border-t p-4 space-y-1">

<div class="flex justify-between font-bold">
<span>Total</span>
<span id="total">$0.00</span>
</div>

<div class="flex justify-between text-indigo-600 font-bold">
<span>Por persona</span>
<span id="split">$0.00</span>
</div>

</div>

<div class="h-3 ticket-dashed"></div>

</div>

<!-- ACTIONS -->
<div class="grid grid-cols-3 gap-2">

<button onclick="shareLink()"
class="bg-slate-800 text-white py-3 rounded-xl flex items-center justify-center gap-1">
<i class="bi bi-link-45deg"></i>
Link
</button>

<button onclick="downloadTicket()"
class="bg-green-500 text-white py-3 rounded-xl flex items-center justify-center gap-1">
<i class="bi bi-download"></i>
Imagen
</button>

<button onclick="resetAll()"
class="bg-red-100 text-red-600 py-3 rounded-xl flex items-center justify-center gap-1">
<i class="bi bi-trash"></i>
</button>

</div>

</div>

<script>

// STATE
let items = [];
let logoBase64 = null;

// INIT FROM URL
window.onload = () => {
loadFromURL();
};

// LOGO
function loadLogo(e){
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = () => {
logoBase64 = reader.result;

document.getElementById("logoPreview").innerHTML =
`<img src="${logoBase64}" class="w-14 h-14 rounded-xl shadow">`;

document.getElementById("logoTicket").innerHTML =
`<img src="${logoBase64}" class="w-10 h-10 mx-auto mb-2 rounded-lg">`;
};

reader.readAsDataURL(file);
}

// ADD ITEM
function addItem(){

const item = document.getElementById("item").value.trim();
const price = parseFloat(document.getElementById("price").value);
const people = parseInt(document.getElementById("people").value) || 1;

if(!item || isNaN(price) || price <= 0){
alert("Datos inválidos");
return;
}

items.push({item, price});

document.getElementById("item").value="";
document.getElementById("price").value="";

render();
}

// RENDER
function render(){

document.getElementById("tBusiness").innerText =
document.getElementById("business").value || "Sin nombre";

document.getElementById("date").innerText =
new Date().toLocaleString();

const list = document.getElementById("list");

list.innerHTML = items.map(i=>`
<div class="flex justify-between text-sm">
<span>${i.item}</span>
<span>$${i.price.toFixed(2)}</span>
</div>
`).join("");

const total = items.reduce((s,i)=>s+i.price,0);
const people = parseInt(document.getElementById("people").value) || 1;

document.getElementById("total").innerText = "$"+total.toFixed(2);
document.getElementById("split").innerText = "$"+(total/people).toFixed(2);
}

// RESET
function resetAll(){
if(!confirm("¿Limpiar todo?")) return;
items = [];
render();
}

// ================= SHARE LINK =================
function shareLink(){

const data = {
business: document.getElementById("business").value,
people: document.getElementById("people").value,
items: items,
logo: logoBase64
};

const encoded = btoa(JSON.stringify(data));

const url = `${window.location.origin}${window.location.pathname}?data=${encoded}`;

navigator.clipboard.writeText(url);

alert("Link copiado ✔");
}

// LOAD FROM LINK
function loadFromURL(){

const params = new URLSearchParams(window.location.search);
const data = params.get("data");

if(!data) return;

try{
const decoded = JSON.parse(atob(data));

items = decoded.items || [];

document.getElementById("business").value = decoded.business || "";
document.getElementById("people").value = decoded.people || "";

if(decoded.logo){
logoBase64 = decoded.logo;

document.getElementById("logoPreview").innerHTML =
`<img src="${logoBase64}" class="w-14 h-14 rounded-xl">`;

document.getElementById("logoTicket").innerHTML =
`<img src="${logoBase64}" class="w-10 h-10 mx-auto mb-2 rounded-lg">`;
}

render();

}catch(e){
console.log("URL inválida");
}
}

// DOWNLOAD IMAGE
async function downloadTicket(){

const el = document.getElementById("ticket");

const canvas = await html2canvas(el,{scale:2});

const a = document.createElement("a");
a.href = canvas.toDataURL();
a.download = "ticket.png";
a.click();
}

</script>

</body>
</html>
